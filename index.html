<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GA Domain Intelligence</title>
<style>
  :root {
    --bg: #0a0c14;
    --card: #111827;
    --card2: #1a2035;
    --border: #1f2d45;
    --text: #e2e8f0;
    --muted: #64748b;
    --muted2: #94a3b8;
    --accent: #4f6ef7;
    --accent2: #7c3aed;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --pink: #ec4899;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* HEADER */
  .header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 50; }
  .logo { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }

  /* API KEY BAR */
  .key-bar { background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .key-bar.hidden { display: none; }
  .key-bar label { font-size: 12px; color: var(--muted2); white-space: nowrap; }
  .key-bar input { flex: 1; min-width: 200px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 13px; font-family: monospace; outline: none; }
  .key-bar input:focus { border-color: var(--accent); }
  .key-bar .btn-save { background: var(--accent); color: #fff; border: none; padding: 8px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .key-saved { font-size: 12px; color: var(--muted2); display: flex; align-items: center; gap: 8px; flex: 1; }
  .key-saved .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; flex-shrink: 0; }
  .key-saved .change-btn { color: var(--accent); background: none; border: none; font-size: 12px; cursor: pointer; padding: 0; }

  /* SEARCH */
  .search-wrap { padding: 24px 20px 16px; max-width: 780px; margin: 0 auto; }
  .search-box { display: flex; gap: 10px; }
  .search-box input { flex: 1; background: var(--card); border: 1.5px solid var(--border); color: var(--text); padding: 14px 18px; border-radius: 12px; font-size: 15px; outline: none; transition: border-color .2s; }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--muted); }
  .btn-analyze { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; padding: 14px 24px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: opacity .2s; }
  .btn-analyze:disabled { opacity: .5; cursor: not-allowed; }

  /* STATES */
  .state { text-align: center; padding: 60px 20px; max-width: 480px; margin: 0 auto; }
  .state .icon { font-size: 52px; margin-bottom: 16px; }
  .state h2 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
  .state p { color: var(--muted2); font-size: 14px; line-height: 1.6; }
  .loading-dots { display: flex; gap: 6px; justify-content: center; margin-top: 20px; }
  .loading-dots span { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: .2s; }
  .loading-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(.7);opacity:.5} 40%{transform:scale(1);opacity:1} }

  /* RESULTS */
  #resultsContainer { max-width: 780px; margin: 0 auto; padding: 0 20px 40px; display: none; }
  #resultsContainer.show { display: block; }

  /* DOMAIN HERO */
  .domain-hero { display: flex; align-items: center; gap: 16px; padding: 20px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .domain-favicon { width: 52px; height: 52px; background: var(--card); border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 24px; flex-shrink: 0; }
  .domain-favicon img { width: 40px; height: 40px; object-fit: contain; }
  .domain-info h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .domain-info p { font-size: 13px; color: var(--muted2); margin-bottom: 8px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--card2); color: var(--muted2); border: 1px solid var(--border); }
  .tag.green { background: rgba(34,197,94,.1); color: var(--green); border-color: rgba(34,197,94,.3); }
  .tag.yellow { background: rgba(245,158,11,.1); color: var(--yellow); border-color: rgba(245,158,11,.3); }
  .tag.red { background: rgba(239,68,68,.1); color: var(--red); border-color: rgba(239,68,68,.3); }

  /* METRICS GRID */
  .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
  @media(min-width:520px) { .metrics-grid { grid-template-columns: repeat(4, 1fr); } }
  .metric-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .metric-card .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .metric-card .value { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .metric-card .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* TWO COL */
  .two-col { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 12px; }
  @media(min-width:600px) { .two-col { grid-template-columns: 1fr 1fr; } }

  /* SECTION CARD */
  .section-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .section-card h3 { font-size: 13px; font-weight: 600; color: var(--muted2); margin-bottom: 14px; text-transform: uppercase; letter-spacing: .4px; }

  /* KEYWORDS */
  .kw-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .kw-row .kw { font-size: 13px; flex: 0 0 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kw-bar-wrap { flex: 1; height: 4px; background: var(--card2); border-radius: 2px; overflow: hidden; }
  .kw-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; }
  .kw-row .vol { font-size: 11px; color: var(--muted2); flex: 0 0 80px; text-align: right; }

  /* SOURCES */
  .src-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .src-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .src-name { font-size: 13px; flex: 1; }
  .src-bar-wrap { flex: 0 0 80px; height: 4px; background: var(--card2); border-radius: 2px; overflow: hidden; }
  .src-bar { height: 100%; border-radius: 2px; }
  .src-pct { font-size: 12px; color: var(--muted2); flex: 0 0 32px; text-align: right; }

  /* COMPANY GRID */
  .company-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .cf-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .cf-value { font-size: 13px; color: var(--text); }
  .company-desc { font-size: 13px; color: var(--muted2); line-height: 1.6; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }

  /* ADS */
  .ads-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 8px; margin-bottom: 12px; }
  .ads-badge.yes { background: rgba(34,197,94,.1); color: var(--green); }
  .ads-badge.no { background: var(--card2); color: var(--muted2); }

  /* WHOIS */
  .whois-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* TABS */
  .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; background: var(--card); border-radius: 10px; padding: 4px; border: 1px solid var(--border); }
  .tab-btn { flex: 1; padding: 8px; border-radius: 7px; border: none; background: transparent; color: var(--muted2); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .2s; }
  .tab-btn.active { background: var(--card2); color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* SIMILARWEB CTA */
  .sw-cta { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; text-align: center; }
  .sw-cta h3 { font-size: 16px; margin-bottom: 8px; }
  .sw-cta p { font-size: 13px; color: var(--muted2); margin-bottom: 16px; line-height: 1.6; }
  .btn-sw { display: inline-flex; align-items: center; gap: 8px; background: #0a66c2; color: #fff; text-decoration: none; padding: 12px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; }
  .btn-sw:hover { opacity: .9; }

  /* CONFIDENCE */
  .confidence-bar { height: 3px; background: var(--card2); border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .confidence-fill { height: 100%; border-radius: 2px; }

  /* ERROR */
  .error-box { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); border-radius: 12px; padding: 16px; margin: 20px; }
  .error-box h3 { color: var(--red); font-size: 14px; margin-bottom: 6px; }
  .error-box p { color: var(--muted2); font-size: 13px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo"><span>GA</span> Intelligence</div>
</div>

<!-- API KEY BAR -->
<div class="key-bar" id="keyBarInput">
  <label>üîë Anthropic API Key:</label>
  <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off" />
  <button class="btn-save" onclick="saveKey()">L∆∞u key</button>
</div>
<div class="key-bar hidden" id="keyBarSaved">
  <div class="key-saved">
    <span class="dot"></span>
    <span>API Key ƒë√£ l∆∞u</span>
    <button class="change-btn" onclick="changeKey()">ƒê·ªïi key</button>
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="domainInput" placeholder="Nh·∫≠p domain: tocotoco.vn, highlands.com.vn..." autocomplete="off" />
    <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">üîç Ph√¢n t√≠ch</button>
  </div>
</div>

<!-- STATES -->
<div class="state" id="emptyState">
  <div class="icon">üåê</div>
  <h2>Ph√¢n t√≠ch domain b·∫•t k·ª≥</h2>
  <p>Traffic ¬∑ Global rank ¬∑ Keywords ¬∑ Ads ¬∑ Th√¥ng tin doanh nghi·ªáp</p>
</div>

<div class="state" id="loadingState" style="display:none">
  <div class="icon">‚ö°</div>
  <h2>ƒêang ph√¢n t√≠ch <span id="loadingDomain"></span></h2>
  <p>ƒêang thu th·∫≠p d·ªØ li·ªáu t·ª´ AI...</p>
  <div class="loading-dots"><span></span><span></span><span></span></div>
</div>

<div style="display:none" id="errorState">
  <div class="error-box">
    <h3>‚öÝÔ∏è <span id="errorTitle">L·ªói</span></h3>
    <p id="errorMsg"></p>
  </div>
</div>

<!-- RESULTS -->
<div id="resultsContainer"></div>

<script>
const PROXY_URL = 'https://ga-domain-intel.onrender.com';
const SRC_COLORS = ['#4f6ef7','#7c3aed','#22c55e','#f59e0b','#ef4444','#ec4899'];
const SRC_NAMES = { direct:'Direct', organic_search:'Organic', paid_search:'Paid Search', social:'Social', referral:'Referral', email:'Email', display:'Display' };

// Warm up Render on page load to prevent sleep delay
fetch(PROXY_URL + '/').catch(()=>{});
setInterval(() => fetch(PROXY_URL + '/').catch(()=>{}), 840000);

// ‚îÄ‚îÄ KEY MANAGEMENT ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function getKey() { return localStorage.getItem('ga_api_key') || ''; }

function saveKey() {
  const k = document.getElementById('apiKeyInput').value.trim();
  if (!k) return;
  localStorage.setItem('ga_api_key', k);
  document.getElementById('keyBarInput').classList.add('hidden');
  document.getElementById('keyBarSaved').classList.remove('hidden');
}

function changeKey() {
  localStorage.removeItem('ga_api_key');
  document.getElementById('apiKeyInput').value = '';
  document.getElementById('keyBarInput').classList.remove('hidden');
  document.getElementById('keyBarSaved').classList.add('hidden');
}

function initKeyBar() {
  if (getKey()) {
    document.getElementById('keyBarInput').classList.add('hidden');
    document.getElementById('keyBarSaved').classList.remove('hidden');
  }
}

// ‚îÄ‚îÄ STATE ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function showState(id) {
  ['emptyState','loadingState','errorState'].forEach(s => {
    const el = document.getElementById(s);
    if (el) el.style.display = s === id ? (s === 'errorState' ? 'block' : 'block') : 'none';
  });
  const rc = document.getElementById('resultsContainer');
  if (rc) rc.classList.remove('show');
}

// ‚îÄ‚îÄ ANALYZE ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
async function analyze() {
  let domain = document.getElementById('domainInput').value.trim();
  if (!domain) return;
  domain = domain.replace(/^https?:\/\//,'').replace(/\/.*$/,'').toLowerCase().trim();
  document.getElementById('domainInput').value = domain;

  const key = getKey();
  if (!key) {
    document.getElementById('apiKeyInput').focus();
    document.getElementById('apiKeyInput').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('apiKeyInput').style.borderColor = '', 2000);
    return;
  }

  showState('loadingState');
  document.getElementById('loadingDomain').textContent = domain;
  document.getElementById('analyzeBtn').disabled = true;

  try {
    const data = await callClaude(domain, key);
    if (!data || typeof data !== 'object') throw new Error('AI kh√¥ng tr·∫£ v·ªÅ d·ªØ li·ªáu h·ª£p l·ªá. Th·ª≠ l·∫°i.');
    renderResults(domain, data);
  } catch(e) {
    showState('errorState');
    document.getElementById('errorTitle').textContent = 'L·ªói ph√¢n t√≠ch';
    document.getElementById('errorMsg').textContent = e.message || 'Kh√¥ng th·ªÉ k·∫øt n·ªëi. Ki·ªÉm tra API key.';
  } finally {
    document.getElementById('analyzeBtn').disabled = false;
  }
}

// ‚îÄ‚îÄ CALL PROXY ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
async function callClaude(domain, key) {
  const res = await fetch(PROXY_URL + '/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ domain: domain, api_key: key })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (res.status === 400 && (err.error||'').includes('API key')) throw new Error('API key kh√¥ng h·ª£p l·ªá. B·∫•m "ƒê·ªïi key" ƒë·ªÉ nh·∫≠p l·∫°i.');
    if (res.status === 429) throw new Error('Qu√° gi·ªõi h·∫°n API. Ch·ªù v√Ýi gi√¢y r·ªìi th·ª≠ l·∫°i.');
    throw new Error(err.error || `L·ªói HTTP ${res.status}`);
  }

  return res.json();
}

// ‚îÄ‚îÄ RENDER ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function renderResults(domain, d) {
  const o = d.overview || {};
  const c = d.company || {};
  const w = d.whois || {};
  const ads = d.ads || {};
  const keywords = d.keywords || [];
  const sources = d.traffic_sources || [];

  const confLabel = { high:'üü¢ Tin c·∫≠y cao', medium:'üü° ∆Ø·ªõc t√≠nh', low:'üî¥ D·ªØ li·ªáu h·∫°n ch·∫ø' }[d.confidence] || 'üü° ∆Ø·ªõc t√≠nh';
  const confColor = { high:'var(--green)', medium:'var(--yellow)', low:'var(--red)' }[d.confidence] || 'var(--yellow)';
  const confPct = { high:90, medium:55, low:25 }[d.confidence] || 55;

  const kwHtml = keywords.slice(0,6).map(k => `
    <div class="kw-row">
      <span class="kw">${k.kw}</span>
      <div class="kw-bar-wrap"><div class="kw-bar" style="width:${k.bar||50}%"></div></div>
      <span class="vol">${k.vol}</span>
    </div>`).join('') || '<p style="color:var(--muted);font-size:13px">Kh√¥ng c√≥ d·ªØ li·ªáu</p>';

  const srcHtml = sources.slice(0,6).map((s,i) => `
    <div class="src-row">
      <div class="src-dot" style="background:${SRC_COLORS[i%SRC_COLORS.length]}"></div>
      <span class="src-name">${SRC_NAMES[s.name]||s.name}</span>
      <div class="src-bar-wrap"><div class="src-bar" style="width:${s.pct}%;background:${SRC_COLORS[i%SRC_COLORS.length]}"></div></div>
      <span class="src-pct">${s.pct}%</span>
    </div>`).join('') || '<p style="color:var(--muted);font-size:13px">Kh√¥ng c√≥ d·ªØ li·ªáu</p>';

  const dfsHtml = `
    <div class="domain-hero">
      <div class="domain-favicon">
        <img src="https://www.google.com/s2/favicons?domain=${domain}&sz=64" onerror="this.parentNode.innerHTML='üåê'" />
      </div>
      <div class="domain-info">
        <h1>${domain}</h1>
        <p>${[c.name, c.industry].filter(x=>x&&x!=='N/A').join(' ¬∑ ') || '√ang ph√¢n t√≠ch...'}</p>
        <div class="tags">
          <span class="tag ${d.confidence==='high'?'green':d.confidence==='low'?'red':'yellow'}">${confLabel}</span>
          ${c.hq && c.hq!=='N/A' ? `<span class="tag">üìç ${c.hq}</span>` : ''}
          ${ads.running ? '<span class="tag green">üí∞ ƒêang ch·∫°y Ads</span>' : '<span class="tag">üìä Kh√¥ng c√≥ Ads</span>'}
        </div>
        <div class="confidence-bar" style="margin-top:10px;max-width:200px">
          <div class="confidence-fill" style="width:${confPct}%;background:${confColor}"></div>
        </div>
      </div>
    </div>

    <div class="metrics-grid">
      <div class="metric-card">
        <div class="label">Monthly Visits</div>
        <div class="value">${o.monthly_visits||'N/A'}</div>
        <div class="sub">∆Ø·ªõc t√≠nh/th√°ng</div>
      </div>
      <div class="metric-card">
        <div class="label">Global Rank</div>
        <div class="value" style="font-size:16px">${o.global_rank||'N/A'}</div>
        <div class="sub">To√Ýn c·∫ßu</div>
      </div>
      <div class="metric-card">
        <div class="label">Country Rank</div>
        <div class="value" style="font-size:16px">${o.country_rank||'N/A'}</div>
        <div class="sub">T·∫°i ${o.country||'VN'}</div>
      </div>
      <div class="metric-card">
        <div class="label">Bounce Rate</div>
        <div class="value">${o.bounce_rate||'N/A'}</div>
        <div class="sub">${o.pages_per_visit||'N/A'} trang ¬∑ ${o.avg_duration||'N/A'}</div>
      </div>
    </div>

    <div class="two-col">
      <div class="section-card">
        <h3>üîë Top Keywords</h3>
        ${kwHtml}
      </div>
      <div class="section-card">
        <h3>üì° Ngu·ªìn Traffic</h3>
        ${srcHtml}
      </div>
    </div>

    <div class="two-col">

}
